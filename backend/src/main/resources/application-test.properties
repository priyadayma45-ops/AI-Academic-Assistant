# Server Configuration
server.port=8080

# Test Database Configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate Configuration for H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable Redis for Tests (Fallback to Simple cache)
spring.cache.type=simple
spring.data.redis.repositories.enabled=false

# JWT Configuration for Tests
app.jwt.secret=9a676781b2e143c7b60e9d6d2a4e21a37c4d5e6f7g8h9i0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z
app.jwt.expiration-ms=3600000
# 1 hour
app.jwt.refresh-expiration-ms=604800000
# 7 days

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.health.redis.enabled=false

