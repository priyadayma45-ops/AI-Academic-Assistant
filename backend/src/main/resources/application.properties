# Server Configuration
server.port=8080
server.servlet.context-path=
spring.profiles.active=test

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/academic_assistant?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configuration
app.jwt.secret=9a676781b2e143c7b60e9d6d2a4e21a37c4d5e6f7g8h9i0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z
app.jwt.expiration-ms=3600000
# 1 hour for Access Token
app.jwt.refresh-expiration-ms=604800000
# 7 days for Refresh Token

# Caching Configuration
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Fallback: if Redis is not running, we can override cache type in dev
# For local run without Redis: spring.cache.type=simple

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Logging Configuration
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [ReqId: %X{requestId}] - %msg%n
logging.level.com.academicassistant=DEBUG
logging.level.org.springframework.security=INFO

# File Upload configuration (for Phase 2 prep)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
